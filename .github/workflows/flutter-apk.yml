name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./kutubxona_app
        run: flutter pub get

      - name: Build APK (Release Payload)
        working-directory: ./kutubxona_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Yuridik-Kutubxona-App
          path: kutubxona_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
