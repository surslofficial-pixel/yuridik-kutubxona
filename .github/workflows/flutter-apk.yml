name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clone Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Verify Flutter version
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        working-directory: ./kutubxona_app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./kutubxona_app
        run: flutter build apk --release

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: kutubxona_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: "latest"
          name: "🔥 Eng So'nggi APK"
          body: "Yuridik Kutubxona dasturining avtomatik yig'ilgan so'nggi va barqaror versiyasi."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
